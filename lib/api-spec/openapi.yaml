openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Project AURA - AI Unified Readiness & Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Global KPI dashboard
  - name: battery
    description: Battery asset performance intelligence
  - name: fleet
    description: Fleet electrification optimizer
  - name: supply-chain
    description: Supply chain intelligence
  - name: manufacturing
    description: Manufacturing quality intelligence
  - name: carbon
    description: Carbon intelligence
  - name: ai-insights
    description: AI Command Center insights
  - name: alerts
    description: Alert management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD KPIs ───────────────────────────────────────────────────────
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get global KPI metrics
      responses:
        "200":
          description: Dashboard KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent platform activity feed
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── BATTERY INTELLIGENCE ─────────────────────────────────────────────────
  /battery/assets:
    get:
      operationId: getBatteryAssets
      tags: [battery]
      summary: List battery assets with health metrics
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [healthy, warning, critical, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated battery assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatteryAssetPage"

  /battery/assets/{assetId}:
    get:
      operationId: getBatteryAsset
      tags: [battery]
      summary: Get detailed battery asset info
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Battery asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatteryAssetDetail"
        "404":
          description: Not found

  /battery/health-summary:
    get:
      operationId: getBatteryHealthSummary
      tags: [battery]
      summary: SOH distribution and degradation trend data
      responses:
        "200":
          description: Battery health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatteryHealthSummary"

  /battery/degradation-trend:
    get:
      operationId: getBatteryDegradationTrend
      tags: [battery]
      summary: Battery degradation trend over time
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Degradation trend data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DegradationDataPoint"

  /battery/alerts:
    get:
      operationId: getBatteryAlerts
      tags: [battery]
      summary: Critical battery alerts
      responses:
        "200":
          description: Battery alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatteryAlert"

  /battery/maintenance-schedule:
    get:
      operationId: getMaintenanceSchedule
      tags: [battery]
      summary: Predictive maintenance schedule
      responses:
        "200":
          description: Maintenance schedule items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceItem"

  # ─── FLEET OPTIMIZER ──────────────────────────────────────────────────────
  /fleet/vehicles:
    get:
      operationId: getFleetVehicles
      tags: [fleet]
      summary: List fleet vehicles with status
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated fleet vehicles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetVehiclePage"

  /fleet/readiness:
    get:
      operationId: getFleetReadiness
      tags: [fleet]
      summary: Fleet electrification readiness score and breakdown
      responses:
        "200":
          description: Fleet readiness metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetReadiness"

  /fleet/ev-recommendations:
    get:
      operationId: getEvRecommendations
      tags: [fleet]
      summary: Recommended EV models for transition
      responses:
        "200":
          description: EV model recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvModelRecommendation"

  /fleet/charging-analysis:
    get:
      operationId: getChargingAnalysis
      tags: [fleet]
      summary: Charging infrastructure analysis
      responses:
        "200":
          description: Charging analysis data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargingAnalysis"

  /fleet/financial-savings:
    get:
      operationId: getFleetFinancialSavings
      tags: [fleet]
      summary: Fleet electrification financial savings projection
      responses:
        "200":
          description: Financial savings data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetFinancialSavings"

  /fleet/transition-timeline:
    get:
      operationId: getTransitionTimeline
      tags: [fleet]
      summary: EV transition timeline milestones
      responses:
        "200":
          description: Transition timeline items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransitionMilestone"

  # ─── SUPPLY CHAIN INTELLIGENCE ────────────────────────────────────────────
  /supply-chain/suppliers:
    get:
      operationId: getSuppliers
      tags: [supply-chain]
      summary: List suppliers with risk scores
      responses:
        "200":
          description: Supplier list with risk data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"

  /supply-chain/risk-summary:
    get:
      operationId: getSupplyChainRiskSummary
      tags: [supply-chain]
      summary: Supply chain risk dashboard summary
      responses:
        "200":
          description: Risk summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyChainRiskSummary"

  /supply-chain/mineral-risks:
    get:
      operationId: getMineralRisks
      tags: [supply-chain]
      summary: Critical mineral risk analysis
      responses:
        "200":
          description: Mineral risk data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MineralRisk"

  /supply-chain/country-risks:
    get:
      operationId: getCountryRisks
      tags: [supply-chain]
      summary: Country-level supply chain risk
      responses:
        "200":
          description: Country risk data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountryRisk"

  /supply-chain/geopolitical-alerts:
    get:
      operationId: getGeopoliticalAlerts
      tags: [supply-chain]
      summary: Geopolitical risk alerts
      responses:
        "200":
          description: Geopolitical alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeopoliticalAlert"

  /supply-chain/network:
    get:
      operationId: getSupplyChainNetwork
      tags: [supply-chain]
      summary: Supply chain network graph data for React Flow
      responses:
        "200":
          description: Network nodes and edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyChainNetwork"

  # ─── MANUFACTURING QUALITY ────────────────────────────────────────────────
  /manufacturing/kpis:
    get:
      operationId: getManufacturingKpis
      tags: [manufacturing]
      summary: Manufacturing quality KPIs
      responses:
        "200":
          description: Production KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturingKpis"

  /manufacturing/quality-drift:
    get:
      operationId: getQualityDrift
      tags: [manufacturing]
      summary: Quality drift trend over time
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Quality drift data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QualityDriftPoint"

  /manufacturing/defects:
    get:
      operationId: getDefectAnalysis
      tags: [manufacturing]
      summary: Defect category analysis
      responses:
        "200":
          description: Defect analysis data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DefectCategory"

  /manufacturing/inspections:
    get:
      operationId: getInspectionResults
      tags: [manufacturing]
      summary: Recent inspection results
      responses:
        "200":
          description: Inspection result list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionResult"

  /manufacturing/heatmap:
    get:
      operationId: getQualityHeatmap
      tags: [manufacturing]
      summary: Quality heatmap data by line and shift
      responses:
        "200":
          description: Heatmap matrix data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualityHeatmap"

  # ─── CARBON INTELLIGENCE ──────────────────────────────────────────────────
  /carbon/overview:
    get:
      operationId: getCarbonOverview
      tags: [carbon]
      summary: Carbon emissions overview and net-zero progress
      responses:
        "200":
          description: Carbon overview data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarbonOverview"

  /carbon/emission-trend:
    get:
      operationId: getCarbonEmissionTrend
      tags: [carbon]
      summary: Carbon emission trend by scope over time
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 24
      responses:
        "200":
          description: Emission trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmissionTrendPoint"

  /carbon/regional:
    get:
      operationId: getCarbonRegional
      tags: [carbon]
      summary: Regional carbon emissions data for map
      responses:
        "200":
          description: Regional carbon data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegionalCarbon"

  /carbon/savings-breakdown:
    get:
      operationId: getCarbonSavingsBreakdown
      tags: [carbon]
      summary: Carbon savings waterfall breakdown
      responses:
        "200":
          description: Carbon savings items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarbonSavingsItem"

  # ─── AI COMMAND CENTER ────────────────────────────────────────────────────
  /ai/insights:
    get:
      operationId: getAiInsights
      tags: [ai-insights]
      summary: AI-generated insight cards
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, dismissed, all]
            default: pending
      responses:
        "200":
          description: AI insight cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiInsight"

  /ai/insights/{insightId}/accept:
    post:
      operationId: acceptAiInsight
      tags: [ai-insights]
      summary: Accept an AI recommendation
      parameters:
        - name: insightId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInsight"
        "404":
          description: Not found

  /ai/insights/{insightId}/dismiss:
    post:
      operationId: dismissAiInsight
      tags: [ai-insights]
      summary: Dismiss an AI recommendation
      parameters:
        - name: insightId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInsight"
        "404":
          description: Not found

  /ai/agent-flow:
    get:
      operationId: getAgentFlow
      tags: [ai-insights]
      summary: AI agent collaboration flow graph for React Flow
      responses:
        "200":
          description: Agent flow nodes and edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentFlow"

  /ai/executive-summary:
    get:
      operationId: getExecutiveSummary
      tags: [ai-insights]
      summary: AI-generated executive summary
      responses:
        "200":
          description: Executive summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveSummary"

  # ─── ALERTS ───────────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get all platform alerts
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, warning, info, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{alertId}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Acknowledged alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  # ─── GEO / MAP ────────────────────────────────────────────────────────────
  /geo/fleet-locations:
    get:
      operationId: getFleetLocations
      tags: [fleet]
      summary: Live fleet vehicle locations for map
      responses:
        "200":
          description: Fleet location markers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetLocationMarker"

  /geo/charging-stations:
    get:
      operationId: getChargingStations
      tags: [fleet]
      summary: Charging station locations for map
      responses:
        "200":
          description: Charging station markers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChargingStation"

  /geo/supplier-locations:
    get:
      operationId: getSupplierLocations
      tags: [supply-chain]
      summary: Supplier geographic locations for map
      responses:
        "200":
          description: Supplier location markers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierLocation"

# ─── SCHEMAS ──────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── DASHBOARD ──
    DashboardKpis:
      type: object
      required:
        - fleetSize
        - criticalAlerts
        - avgBatterySoh
        - avgRul
        - supplyChainRiskScore
        - fleetReadinessScore
        - totalCostSavings
        - carbonReduction
      properties:
        fleetSize:
          $ref: "#/components/schemas/KpiMetric"
        criticalAlerts:
          $ref: "#/components/schemas/KpiMetric"
        avgBatterySoh:
          $ref: "#/components/schemas/KpiMetric"
        avgRul:
          $ref: "#/components/schemas/KpiMetric"
        supplyChainRiskScore:
          $ref: "#/components/schemas/KpiMetric"
        fleetReadinessScore:
          $ref: "#/components/schemas/KpiMetric"
        totalCostSavings:
          $ref: "#/components/schemas/KpiMetric"
        carbonReduction:
          $ref: "#/components/schemas/KpiMetric"

    KpiMetric:
      type: object
      required: [value, unit, trend, changePercent, sparkline]
      properties:
        value:
          type: number
        unit:
          type: string
        trend:
          type: string
          enum: [up, down, stable]
        changePercent:
          type: number
        sparkline:
          type: array
          items:
            type: number

    ActivityItem:
      type: object
      required: [id, timestamp, type, message, severity]
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum: [battery, fleet, supply-chain, manufacturing, carbon, ai]
        message:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        assetId:
          type: ["string", "null"]

    # ── BATTERY ──
    BatteryAsset:
      type: object
      required: [id, batteryId, vehicleId, soh, rul, status, temperature, cycles, lastUpdated]
      properties:
        id:
          type: string
        batteryId:
          type: string
        vehicleId:
          type: string
        soh:
          type: number
          description: State of health percentage (0-100)
        rul:
          type: number
          description: Remaining useful life in days
        status:
          type: string
          enum: [healthy, warning, critical]
        temperature:
          type: number
          description: Temperature in Celsius
        cycles:
          type: integer
        capacity:
          type: number
          description: Current capacity in kWh
        nominalCapacity:
          type: number
          description: Nominal capacity in kWh
        lastUpdated:
          type: string
          format: date-time
        predictedFailureDate:
          type: ["string", "null"]
          format: date-time
        location:
          type: ["string", "null"]

    BatteryAssetDetail:
      type: object
      required: [id, batteryId, vehicleId, soh, rul, status, temperature, cycles, history, maintenanceHistory]
      properties:
        id:
          type: string
        batteryId:
          type: string
        vehicleId:
          type: string
        soh:
          type: number
        rul:
          type: number
        status:
          type: string
          enum: [healthy, warning, critical]
        temperature:
          type: number
        cycles:
          type: integer
        capacity:
          type: number
        nominalCapacity:
          type: number
        lastUpdated:
          type: string
          format: date-time
        predictedFailureDate:
          type: ["string", "null"]
          format: date-time
        location:
          type: ["string", "null"]
        history:
          type: array
          items:
            $ref: "#/components/schemas/BatteryHistoryPoint"
        maintenanceHistory:
          type: array
          items:
            $ref: "#/components/schemas/MaintenanceHistoryItem"
        aiRiskNarrative:
          type: ["string", "null"]

    BatteryHistoryPoint:
      type: object
      required: [date, soh, temperature, cycles]
      properties:
        date:
          type: string
          format: date
        soh:
          type: number
        temperature:
          type: number
        cycles:
          type: integer

    MaintenanceHistoryItem:
      type: object
      required: [date, type, description, technician]
      properties:
        date:
          type: string
          format: date
        type:
          type: string
        description:
          type: string
        technician:
          type: string

    BatteryAssetPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BatteryAsset"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    BatteryHealthSummary:
      type: object
      required: [sohDistribution, totalAssets, healthyCount, warningCount, criticalCount, avgSoh, avgRul]
      properties:
        sohDistribution:
          type: array
          items:
            $ref: "#/components/schemas/SohBucket"
        totalAssets:
          type: integer
        healthyCount:
          type: integer
        warningCount:
          type: integer
        criticalCount:
          type: integer
        avgSoh:
          type: number
        avgRul:
          type: number
        estimatedSavings:
          type: number

    SohBucket:
      type: object
      required: [range, count, percentage]
      properties:
        range:
          type: string
        count:
          type: integer
        percentage:
          type: number

    DegradationDataPoint:
      type: object
      required: [month, avgSoh, p10Soh, p90Soh, predicted]
      properties:
        month:
          type: string
        avgSoh:
          type: number
        p10Soh:
          type: number
        p90Soh:
          type: number
        predicted:
          type: boolean

    BatteryAlert:
      type: object
      required: [id, batteryId, vehicleId, type, severity, message, timestamp, acknowledged]
      properties:
        id:
          type: string
        batteryId:
          type: string
        vehicleId:
          type: string
        type:
          type: string
          enum: [temperature, degradation, capacity, voltage, rul]
        severity:
          type: string
          enum: [critical, warning]
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        acknowledged:
          type: boolean

    MaintenanceItem:
      type: object
      required: [id, batteryId, vehicleId, scheduledDate, type, priority, estimatedDowntime, estimatedCost]
      properties:
        id:
          type: string
        batteryId:
          type: string
        vehicleId:
          type: string
        scheduledDate:
          type: string
          format: date
        type:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        estimatedDowntime:
          type: number
          description: Hours
        estimatedCost:
          type: number

    # ── FLEET ──
    FleetVehicle:
      type: object
      required: [id, vehicleId, make, model, year, type, status, batterySOH, mileage, lastService, driver]
      properties:
        id:
          type: string
        vehicleId:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        type:
          type: string
          enum: [BEV, PHEV, HEV, ICE]
        status:
          type: string
          enum: [active, maintenance, charging, idle, offline]
        batterySOH:
          type: ["number", "null"]
        mileage:
          type: number
        lastService:
          type: string
          format: date
        driver:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        electrificationScore:
          type: ["number", "null"]

    FleetVehiclePage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FleetVehicle"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    FleetReadiness:
      type: object
      required: [overallScore, evCount, iceCount, hybridCount, readinessByCategory, scoreTrend]
      properties:
        overallScore:
          type: number
        evCount:
          type: integer
        iceCount:
          type: integer
        hybridCount:
          type: integer
        readinessByCategory:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessCategory"
        scoreTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"

    ReadinessCategory:
      type: object
      required: [category, score, maxScore]
      properties:
        category:
          type: string
        score:
          type: number
        maxScore:
          type: number

    TrendPoint:
      type: object
      required: [date, value]
